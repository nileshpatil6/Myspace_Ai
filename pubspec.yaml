name: myspace_ai
description: Premium AI-powered personal notes and memory companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # AI — Gemini API (direct REST, no Firebase required)
  google_generative_ai: ^0.4.7
  dio: ^5.7.0

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.4

  # State management & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.3.0

  # Audio
  record: ^5.2.0
  just_audio: ^0.9.43
  audio_waveforms: ^1.2.1

  # Notifications & Background
  flutter_local_notifications: ^18.0.1
  flutter_foreground_task: ^8.15.2
  timezone: ^0.9.4

  # Permissions & System
  permission_handler: ^11.3.1
  device_info_plus: ^11.4.0

  # Storage & Files
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  uuid: ^4.5.1

  # UI & Animation
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  gap: ^3.0.1
  flutter_markdown: ^0.7.4

  # Utilities
  equatable: ^2.0.7
  logger: ^2.5.0
  intl: ^0.20.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
